<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jiraiya Terminal — Live Crypto Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #00ff88;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    padding: 20px;
  }
  .terminal {
    max-width: 1000px;
    margin: 0 auto;
    border: 1px solid #00ff8833;
    border-radius: 8px;
    overflow: hidden;
  }
  .header {
    background: #0d1117;
    padding: 16px 24px;
    border-bottom: 1px solid #00ff8833;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .header h1 {
    font-size: 18px;
    color: #00ff88;
    letter-spacing: 2px;
  }
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #00ff8888;
  }
  .status-dot {
    width: 8px; height: 8px;
    background: #00ff88;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .content { padding: 24px; }
  .section {
    margin-bottom: 32px;
    border: 1px solid #00ff8815;
    border-radius: 6px;
    overflow: hidden;
  }
  .section-title {
    background: #0d1117;
    padding: 12px 16px;
    font-size: 13px;
    color: #00ff88;
    border-bottom: 1px solid #00ff8815;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '>';
    color: #00ff88;
  }
  .ticker-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    padding: 16px;
  }
  .ticker-card {
    background: #0d1117;
    border: 1px solid #00ff8815;
    border-radius: 6px;
    padding: 16px;
    transition: border-color 0.3s;
  }
  .ticker-card:hover { border-color: #00ff8844; }
  .ticker-symbol {
    font-size: 14px;
    color: #fff;
    margin-bottom: 8px;
  }
  .ticker-price {
    font-size: 22px;
    font-weight: bold;
    color: #00ff88;
    margin-bottom: 4px;
  }
  .ticker-change {
    font-size: 12px;
  }
  .ticker-change.up { color: #00ff88; }
  .ticker-change.down { color: #ff4444; }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th {
    text-align: left;
    padding: 12px 16px;
    font-size: 11px;
    color: #00ff8888;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid #00ff8815;
    background: #0d1117;
  }
  td {
    padding: 12px 16px;
    font-size: 13px;
    border-bottom: 1px solid #00ff8808;
  }
  tr:hover td { background: #00ff8805; }
  .token-name {
    color: #fff;
    font-weight: bold;
  }
  .token-symbol { color: #00ff8888; font-size: 11px; }
  .price { color: #00ff88; font-weight: bold; }
  .change.up { color: #00ff88; }
  .change.down { color: #ff4444; }
  .volume { color: #888; font-size: 12px; }
  .footer {
    padding: 16px 24px;
    border-top: 1px solid #00ff8815;
    font-size: 11px;
    color: #00ff8844;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .loading { text-align: center; padding: 40px; color: #00ff8844; }
  .error { color: #ff4444; padding: 16px; font-size: 12px; }
  .refresh-time { color: #00ff8844; }
  @media (max-width: 600px) {
    body { padding: 10px; }
    .content { padding: 12px; }
    .ticker-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="terminal">
  <div class="header">
    <h1>⚡ JIRAIYA TERMINAL v1.0</h1>
    <div class="status">
      <span class="status-dot"></span>
      <span>LIVE — Powered by Hermes Agent</span>
    </div>
  </div>
  <div class="content">
    <div class="section">
      <div class="section-title">SOLANA PRICE TICKER — Jupiter API v3</div>
      <div class="ticker-grid" id="ticker">
        <div class="loading">Loading live prices...</div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">TRENDING TOKENS — DexScreener + Jupiter</div>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>Token</th>
              <th>Price</th>
              <th>24h Change</th>
            </tr>
          </thead>
          <tbody id="trending">
            <tr><td colspan="3" class="loading">Loading trending data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <div class="footer">
    <span>Built autonomously by Jiraiya (Hermes Agent) · DeepSeek v4-pro</span>
    <span class="refresh-time" id="refresh">Last refresh: ...</span>
  </div>
</div>

<script>
const SOL_TOKENS = [
  { mint: 'So11111111111111111111111111111111111111112', symbol: 'SOL' },
  { mint: 'EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v', symbol: 'USDC' },
  { mint: 'JUPyiwrYJFskUPiHa7hkeR8VUtAeFoSYbKedZNsDvCN', symbol: 'JUP' },
  { mint: 'DezXAZ8z7PnrnRJjz3wXBoRgixCa6xjnB7YaB1pPB263', symbol: 'BONK' },
  { mint: '7GCihgDB8fe6KNjn2MYtkzZcRjQy3t9GHdC8uHYmW2hr', symbol: 'POPCAT' },
  { mint: '2weMjPLLybRMMva1fM3U31goWWrCpF59CHWNhnCJ9Vyh', symbol: 'WIF' },
];

async function fetchPrices() {
  try {
    const ids = SOL_TOKENS.map(t => t.mint).join(',');
    const resp = await fetch(`https://api.jup.ag/price/v3?ids=${ids}`);
    const data = await resp.json();
    const container = document.getElementById('ticker');
    container.innerHTML = SOL_TOKENS.filter(t => data[t.mint] && data[t.mint].usdPrice != null).map(t => {
      const d = data[t.mint];
      const price = d.usdPrice;
      const change = d.priceChange24h || 0;
      const changeClass = change >= 0 ? 'up' : 'down';
      const sign = change >= 0 ? '+' : '';
      const fmtPrice = price < 0.01 ? price.toFixed(6) : price < 1 ? price.toFixed(4) : price.toFixed(2);
      return `
        <div class="ticker-card">
          <div class="ticker-symbol">${t.symbol}</div>
          <div class="ticker-price">$${fmtPrice}</div>
          <div class="ticker-change ${changeClass}">${sign}${change.toFixed(2)}%</div>
        </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('ticker').innerHTML = '<div class="error">Failed to load prices: ' + e.message + '</div>';
  }
}

async function fetchTrending() {
  try {
    // Curated list of popular Solana tokens
    const trendingTokens = [
      { mint: 'So11111111111111111111111111111111111111112', symbol: 'SOL' },
      { mint: 'JUPyiwrYJFskUPiHa7hkeR8VUtAeFoSYbKedZNsDvCN', symbol: 'JUP' },
      { mint: 'DezXAZ8z7PnrnRJjz3wXBoRgixCa6xjnB7YaB1pPB263', symbol: 'BONK' },
      { mint: '7GCihgDB8fe6KNjn2MYtkzZcRjQy3t9GHdC8uHYmW2hr', symbol: 'POPCAT' },
      { mint: '2weMjPLLybRMMva1fM3U31goWWrCpF59CHWNhnCJ9Vyh', symbol: 'WIF' },
      { mint: 'EKpQGSJtjMFqKZ9KQanSqYXRcF8fBopzLHYxdM65zcjm', symbol: 'WIF2' },
      { mint: 'MEW1gQWJ3nEXg2qgERiKu7FAFj79PHvQVREQUzScPP5', symbol: 'MEW' },
      { mint: '7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU', symbol: 'SAMO' },
      { mint: '4k3Dyjzvzp8eMZWUXbBCjEvwSkkk59S5iCNLY3QrkX6R', symbol: 'RAY' },
      { mint: 'HZ1JovNiVvGrGNiiYvEozEVgZ58xaU3RKwX8eACQBCt3', symbol: 'PYTH' },
      { mint: '3NZ9JMVBmGAqocybic2c7LQCJScmgsAZ6vQqTDzcqmJh', symbol: 'WBTC' },
      { mint: '7vfCXTUXx5WJV5JADk17DUJ4ksgau7utNKj4b963voxs', symbol: 'WETH' },
      { mint: 'RLBxxFkseAZ4RgJH3Sqn8jXxhmGoz9jWxDNJMh8pL7a', symbol: 'RLB' },
      { mint: 'TNSRxcUxoT9xBG3de7PiJyTDYu7kskLqcpddxnEJAS6', symbol: 'TNSR' },
      { mint: 'CLoUDKc4Ane7HeQcPpE3YHnznRxhMimJ4MyaU6WVHF2p', symbol: 'CLOUD' },
    ];
    
    const ids = trendingTokens.map(t => t.mint).join(',');
    const resp = await fetch(`https://api.jup.ag/price/v3?ids=${ids}`);
    const data = await resp.json();
    
    const tbody = document.getElementById('trending');
    const rows = trendingTokens.filter(t => data[t.mint] && data[t.mint].usdPrice != null).map(t => {
      const p = data[t.mint];
      const price = p.usdPrice;
      const change = p.priceChange24h || 0;
      const changeClass = change >= 0 ? 'up' : 'down';
      const sign = change >= 0 ? '+' : '';
      const fmtPrice = price < 0.0001 ? price.toFixed(8) : price < 1 ? price.toFixed(6) : price.toFixed(2);
      return `
        <tr>
          <td><span class="token-name">${t.symbol}</span></td>
          <td class="price">$${fmtPrice}</td>
          <td class="change ${changeClass}">${sign}${change.toFixed(2)}%</td>
        </tr>`;
    });
    
    tbody.innerHTML = rows.length > 0 ? rows.join('') : '<tr><td colspan="3" class="loading">No price data available</td></tr>';
    document.getElementById('refresh').textContent = `Last refresh: ${new Date().toLocaleTimeString()}`;
  } catch(e) {
    document.getElementById('trending').innerHTML = `<tr><td colspan="3" class="error">Failed: ${e.message}</td></tr>`;
  }
}

async function refresh() {
  await Promise.all([fetchPrices(), fetchTrending()]);
}

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
